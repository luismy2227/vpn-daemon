name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Python
        run: uv python install 3.11

      - name: Sync dev dependencies
        run: uv sync --group dev

      - name: Flake8
        run: uv run flake8 src tests

      - name: Pytest
        run: uv run pytest
